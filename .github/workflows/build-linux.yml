name: Build Linux Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt || true; fi
          pip install pyinstaller

      - name: Run tests
        run: |
          if [ -f requirements-dev.txt ]; then
            pytest -q || true
          else
            echo "No dev requirements found; skipping pytest"
          fi

      - name: Smoke import GUI module
        run: |
          python -c "import utils.gui_metadata; print('GUI import OK')"
      
      - name: Build executable with PyInstaller
        run: |
          pyinstaller tifDebloat.spec

      - name: Build GUI executable (additional spec)
        if: always()
        run: |
          if [ -f tiff_comp.spec ]; then pyinstaller tiff_comp.spec || true; else echo 'No tiff_comp.spec found'; fi

      - name: Create release directory
        run: |
          mkdir -p release
          cp dist/tifDebloat release/
          chmod +x release/tifDebloat

      - name: Verify executable
        run: |
          file release/tifDebloat
          release/tifDebloat --help 2>/dev/null || true

      - name: Create tarball
        run: |
          cd release
          tar -czf tifDebloat-linux-x64.tar.gz tifDebloat
      - name: Package full dist directory
        run: |
          mkdir -p release/dist_archive
          tar -czf release/tifDebloat-dist-linux-x64.tar.gz -C dist tifDebloat || true
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tifDebloat-linux
          path: |
            release/tifDebloat
            release/tifDebloat-linux-x64.tar.gz
            release/tifDebloat-dist-linux-x64.tar.gz
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/tifDebloat
            release/tifDebloat-linux-x64.tar.gz
            release/tifDebloat-dist-linux-x64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version || '3.11' }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt || true; fi
          pip install pyinstaller

      - name: Smoke import GUI module
        shell: bash
        run: |
          python -c "import utils.gui_metadata; print('GUI import OK')"

      - name: Build GUI executable (Windows)
        shell: bash
        run: |
          if [ -f tiff_comp.spec ]; then pyinstaller tiff_comp.spec || true; else echo 'No tiff_comp.spec found'; fi

      - name: Create release directory (Windows)
        shell: bash
        run: |
          mkdir -p release
          if [ -f dist/tiff_comp.exe ]; then cp dist/tiff_comp.exe release/; fi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tifDebloat-windows
          path: |
            release/
          retention-days: 30

  create-release:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: tifDebloat-linux
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: tifDebloat-windows
          path: artifacts/windows

      - name: List artifacts
        run: |
          ls -R artifacts || true

      - name: Create Release with all artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux/**
            artifacts/windows/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
